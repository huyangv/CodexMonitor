name: Build macOS Intel (unsigned)

on:
  workflow_dispatch:

jobs:
  build_macos_intel:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (brew)
        run: |
          brew update
          brew install cmake pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm deps
        run: npm ci

      - name: Prepare temporary Tauri updater signing key
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/codexmonitor.key"
          npm run tauri signer generate -- --ci -w "$KEY_PATH"
          {
            echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_PATH"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD="
          } >> "$GITHUB_ENV"

      - name: Build Tauri app and DMG (macOS Intel)
        shell: bash
        run: |
          set -euo pipefail
          npm run tauri -- build --bundles app,dmg

      - name: Show bundle outputs
        shell: bash
        run: |
          set -euo pipefail
          find src-tauri/target/release/bundle -maxdepth 3 -type f | sort

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CodexMonitor-macos-intel
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/**/*