name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_macos:
    name: macOS Intel bundles
    runs-on: macos-13
    env:
      MACOS_TARGET: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install CMake
        run: brew install cmake

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: |
          set -euo pipefail
          TEMP_TAURI_CONFIG="$(mktemp -t codexmonitor-tauri-release)"

          python3 - <<'PY' "$TEMP_TAURI_CONFIG"
          import json
          import sys
          from pathlib import Path

          base = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          base.setdefault("bundle", {})["createUpdaterArtifacts"] = False
          Path(sys.argv[1]).write_text(json.dumps(base))
          PY

          npm run tauri -- build --config "$TEMP_TAURI_CONFIG" --target "$MACOS_TARGET" --bundles app

      - name: Build daemon binaries
        run: |
          set -euo pipefail
          cd src-tauri
          cargo build --release --target "$MACOS_TARGET" --bin codex_monitor_daemon --bin codex_monitor_daemonctl

      - name: Bundle OpenSSL and embedded binaries
        run: |
          set -euo pipefail
          TARGET_DIR="src-tauri/target/$MACOS_TARGET/release"

          DAEMON_BINARY_PATH="$TARGET_DIR/codex_monitor_daemon" \
          DAEMONCTL_BINARY_PATH="$TARGET_DIR/codex_monitor_daemonctl" \
          scripts/macos-fix-openssl.sh \
            "$TARGET_DIR/bundle/macos/Codex Monitor.app"

      - name: Package artifacts
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          TARGET_DIR="src-tauri/target/$MACOS_TARGET/release"
          BUNDLE_DIR="$TARGET_DIR/bundle/macos"
          APP_PATH="$BUNDLE_DIR/Codex Monitor.app"

          mkdir -p release-artifacts release-artifacts/dmg-root
          rm -rf "release-artifacts/dmg-root/Codex Monitor.app"
          ditto "$APP_PATH" "release-artifacts/dmg-root/Codex Monitor.app"

          ditto -c -k --keepParent \
            "$APP_PATH" \
            release-artifacts/CodexMonitor.zip

          hdiutil create -volname "Codex Monitor" \
            -srcfolder release-artifacts/dmg-root \
            -ov -format UDZO \
            "release-artifacts/CodexMonitor_${VERSION}_x86_64.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-artifacts
          path: |
            release-artifacts/CodexMonitor.zip
            release-artifacts/CodexMonitor_*_x86_64.dmg

  release:
    name: Publish Intel macOS release
    runs-on: ubuntu-latest
    needs:
      - build_macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-intel-artifacts
          path: release-artifacts

      - name: Normalize release artifact filenames
        run: |
          set -euo pipefail
          while IFS= read -r -d '' artifact; do
            dir=$(dirname "$artifact")
            file=$(basename "$artifact")
            normalized="${file// /.}"
            if [ "$file" = "$normalized" ]; then
              continue
            fi
            target="${dir}/${normalized}"
            if [ -e "$target" ]; then
              echo "Cannot normalize filename because target already exists: $target"
              exit 1
            fi
            echo "Renaming $artifact -> $target"
            mv "$artifact" "$target"
          done < <(find release-artifacts -type f -name '* *' -print0)

      - name: Build release notes
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -v "^v${VERSION}$" \
            | head -n 1 || true)
          RANGE_END="${GITHUB_SHA}"
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          else
            git log "${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          fi

          python3 - <<'PY'
          import re
          from pathlib import Path

          lines = Path("release-artifacts/release-commits.txt").read_text().splitlines()
          pattern = re.compile(r"^(feat|fix|perf)(?:\([^)]*\))?:\s*(.+)$", re.IGNORECASE)
          groups = {"feat": [], "fix": [], "perf": []}
          for line in lines:
              match = pattern.match(line.strip())
              if not match:
                  continue
              kind = match.group(1).lower()
              message = match.group(2).strip()
              if message:
                  groups[kind].append(message)

          sections = [
              ("## New Features", "feat"),
              ("## Fixes", "fix"),
              ("## Performance Improvements", "perf"),
          ]
          output = []
          for title, key in sections:
              items = groups[key]
              if not items:
                  continue
              output.append(title)
              output.extend([f"- {item}" for item in items])
              output.append("")

          notes = "\n".join(output).strip()
          if not notes:
              notes = "- No user-facing changes."

          Path("release-artifacts/release-notes.md").write_text(notes + "\n")
          PY

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" \
              release-artifacts/CodexMonitor.zip \
              "release-artifacts/CodexMonitor_${VERSION}_x86_64.dmg" \
              --clobber
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file release-artifacts/release-notes.md \
              --target "$GITHUB_SHA" \
              release-artifacts/CodexMonitor.zip \
              "release-artifacts/CodexMonitor_${VERSION}_x86_64.dmg"
          fi
